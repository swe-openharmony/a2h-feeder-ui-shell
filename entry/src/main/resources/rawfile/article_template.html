<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    color: #212121;
    margin: 0;
    padding: 16px;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
    margin: 8px 0;
  }
  a {
    color: #0b8043;
    text-decoration: none;
  }
  a:hover {
    text-decoration: underline;
  }
  pre {
    background: #f5f5f5;
    padding: 12px;
    border-radius: 4px;
    overflow-x: auto;
    font-size: 14px;
  }
  blockquote {
    border-left: 3px solid #0b8043;
    margin: 8px 0;
    padding: 8px 16px;
    color: #757575;
  }
  h1, h2, h3, h4, h5, h6 {
    margin-top: 16px;
    margin-bottom: 8px;
  }
  p {
    margin: 8px 0;
  }
  ul, ol {
    padding-left: 24px;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    margin: 8px 0;
  }
  td, th {
    border: 1px solid #e0e0e0;
    padding: 8px;
    text-align: left;
  }
  video, audio {
    max-width: 100%;
  }
  .article-title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 8px;
  }
  .article-meta {
    font-size: 13px;
    color: #757575;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="article-title">{{TITLE}}</div>
<div class="article-meta">{{FEED_TITLE}} · {{PUB_DATE}}</div>
<div class="article-content">{{CONTENT}}</div>
</body>
</html>
